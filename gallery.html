<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery Photos | Santhidam Bethania Matriculation School</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="gallery">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="../index.html">Santhidam Bethania Matriculation School</a>
      <nav class="top-nav">
        <a href="index.html">Gallery</a>
        <a href="../index.html">Main Website</a>
      </nav>
    </div>
  </header>

  <main class="container page-main">
    <section class="hero">
      <a class="back-link" href="index.html">&larr; Back to Sections</a>
      <p class="eyebrow">Photo Collection</p>
      <h1 id="sectionTitle">Gallery Photos</h1>
      <p id="sectionDescription">All photos in this section.</p>
    </section>

    <section id="photoGrid" class="photo-grid" aria-label="Section Photos"></section>
  </main>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button id="lightboxClose" class="lightbox-close" aria-label="Close slideshow">&times;</button>
    <button id="lightboxPrev" class="lightbox-nav prev" aria-label="Previous photo">&#10094;</button>
    <img id="lightboxImage" src="" alt="Slideshow image" />
    <button id="lightboxNext" class="lightbox-nav next" aria-label="Next photo">&#10095;</button>
  </div>

  <script src="gallery.js"></script>
</body>
</html>
