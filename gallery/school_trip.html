<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Trip | School Gallery</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="school_trip">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="../index.html">Santhidam Bethania Matriculation School</a>
      <nav class="top-nav">
        <a href="gallery.html">Gallery Home</a>
        <a href="../index.html">Main Website</a>
      </nav>
    </div>
  </header>

  <main class="container page-main">
    <section class="section-head fade-in">
      <a class="back-link" href="gallery.html">&larr; Back to Gallery</a>
      <p class="eyebrow">Trip Collection</p>
      <h1>School Trip</h1>
      <p>Photo highlights from educational tours and field visit activities.</p>

    <section id="galleryGrid" class="image-grid"></section>

  <div id="lightbox" class="lightbox" aria-hidden="true">

    <button id="lightboxPrev" class="lightbox-nav prev" aria-label="Previous image">&#10094;</button>
    <img id="lightboxImage" src="" alt="Gallery preview" />
    <button id="lightboxNext" class="lightbox-nav next" aria-label="Next image">&#10095;</button>
  </div>

  <script src="js/gallery.js"></script>
